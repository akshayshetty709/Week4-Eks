name: Deploy

on:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: ap-south-1
  CLUSTER_NAME: React-cluster  

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
        aws-region: ap-south-1

    - name: Login to ECR
      uses: aws-actions/amazon-ecr-login@v2
      
    - name: Build & Push Backend
      run: |
        docker build -t backend ./Backend
        docker tag backend:latest ${{ secrets.ECR_URL }}/backend-app:latest
        docker push ${{ secrets.ECR_URL }}/backend-app:latest

    - name: Build & Push Frontend
      run: |
        docker build -t frontend ./Frontend
        docker tag frontend:latest ${{ secrets.ECR_URL }}/frontend-app:latest
        docker push ${{ secrets.ECR_URL }}/frontend-app:latest

    - name: Deploy
      run: |
        aws eks update-kubeconfig --name $CLUSTER_NAME --region $AWS_REGION
        kubectl apply -f k8s/
        kubectl get all -n three-tier


